name: 'download'

on:
  workflow_dispatch:
  push:
  schedule:
    - cron:  '* * * * *'

concurrency:
  group: download
  cancel-in-progress: true

env:
  mirror: https://mirrors.manjaro.org/repo

jobs:
  state:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - id: state
        run: | 
          source <(curl -s ${{ env.mirror }}/state)
          echo "state=$state" >>$GITHUB_OUTPUT
      - id: store
        uses: boredland/action-commit-store@main
        with:
          storage-commit-sha: 07d7f7b02cae28f9b736371619b152f6f5ded4cc
          key: state-hash
          value: ${{ steps.state.outputs.state }}
          token: ${{ github.token }}
    outputs:
      updated: ${{ steps.store.outputs.updated }}
      version: ${{ steps.store.outputs.value }}
  download-db:
    runs-on: ubuntu-latest
    needs: [state]
    permissions:
      contents: write
    if: ${{ needs.state.outputs.updated == 'true' }}
    steps:
      - name: checkout
        uses: actions/checkout@ac593985615ec2ede58e132d2e21d2b1cbd6127c # v3
        with:
          fetch-depth: 1
      - name: download
        run: |
          rm -rf repo/*
          mkdir -p repo
          for db in community core extra multilib; do
            for branch in stable testing unstable; do
              for arch in x86_64 aarch64; do
                if [ $arch == "aarch64" ]; then
                  branch=arm-${branch}
                fi
                url=${{ env.mirror }}/${branch}/${db}/$arch/${db}.db.tar.gz
                echo downloading $url
                curl -s $url | tar --warning=none -xz --one-top-level=./repo/${branch}-${db}/ &
              done
            done
          done
          wait
      - name: persist
        run: |
          git config user.name repo-add-bot
          git config user.email info@manjaro.download

          if [[ `git status --porcelain` ]]; then
            git status --porcelain
            git add repo/*
            git commit -m "chore: update extracted DESC to ${{ needs.state.outputs.version }}"
            git push
          fi
